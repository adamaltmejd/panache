# Markdown flavor (affects default extensions)
flavor = "quarto" # Options: pandoc, quarto, rmarkdown, gfm, commonmark

line-width = 80 # Line width for wrapping

# Formatting options
[format]
wrap = "reflow" # Wrapping mode. Options: "reflow", "preserve", "sentence"

# External code formatters
[formatters]
r = "air"
yaml = "yamlfmt"

[formatters.yamlfmt]
cmd = "yamlfmt"
args = ["-"]

# External linters
[linters]
r = "jarl"
python = "ruff"
